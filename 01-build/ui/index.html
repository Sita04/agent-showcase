<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Shopping Squad</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
</head>
<body>
    <div class="glass-container">
        <header>
            <div>
                <h1>Shopping Squad</h1>
                <div class="subtitle">AI-Powered Hyper-Personalized Curation</div>
            </div>
                        <div class="header-right">
                <div class="status-badge" id="bot-status">⚡ Online</div>
                <div class="cart-btn" id="cart-btn">🛒 <span id="cart-count">0</span></div>
            </div>
        </header>

        <div class="chat-window" id="chat-window">
            <div class="message agent">👋 Hello! I'm your Personal Shopper. Describe what you are looking for (e.g., "Camping trip gear for 2 people, budget $500") or upload an image of a style you like!</div>
        </div>

        <div class="controls">
            <div class="input-wrapper">
                <input type="file" id="image-upload" accept="image/*" style="display: none;">
                <input type="text" id="user-input" placeholder="Type your request here...">
                <label for="image-upload" class="upload-btn">📎</label>
                <button class="send-btn" id="send-btn">Search</button>
            </div>
        </div>
    </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-btn" id="close-cart-btn">✕</button>
        </div>
        <div class="cart-items" id="cart-items">
            <div class="empty-cart-msg">Your cart is empty</div>
        </div>
        <div class="cart-footer">
            <div class="total-price">Total: $<span id="cart-total">0.00</span></div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js?v=7"></script>
</body>
</html>
