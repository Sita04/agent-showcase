<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Shopping Squad</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
</head>
<body>
    <div class="glass-container">
        <div class="persona-sidebar">
            <h2>Select Persona</h2>
            <select id="persona-select">
                <option value="lucy">Lucy (Mid 20s, Trendy)</option>
                <option value="adam" selected>Adam (30s, Outdoorsy)</option>
                <option value="elena">Elena (40s, Professional)</option>
            </select>
            <div id="persona-details" class="persona-details">
                <p>Select a persona to see details.</p>
            </div>
        </div>

        <div class="main-content">
            <header>
                <div>
                    <h1>Shopping Squad</h1>
                    <div class="subtitle">AI-Powered Hyper-Personalized Curation</div>
                </div>
                <div class="header-right">
                    <div class="status-badge" id="bot-status">⚡ Online</div>

                </div>
            </header>

            <div class="chat-window" id="chat-window">
                <div class="message agent">👋 Hello! I'm your Personal Shopper. What would you like to shop for today?</div>
            </div>

            <div class="controls">
                <div class="input-wrapper">
                    <input type="file" id="image-upload" style="display: none;">
                    <label for="image-upload" class="upload-btn">📎</label>
                    <input type="text" id="user-input" placeholder="Type your request here...">
                    <button class="send-btn" id="send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>



    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Clear Session?</h3>
            <p>Changing persona will clear your cart and conversation. Proceed?</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="modal-btn secondary">Cancel</button>
                <button id="modal-ok" class="modal-btn primary">OK</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js?v=7"></script>
</body>
</html>
